apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts
    chart: infisical-standalone
    targetRevision: 1.10.0
    helm:
      releaseName: infisical
      values: |
        infisical:
          fullnameOverride: infisical
          # Kubernetes Secret (created manually, NOT in Git) holding AUTH_SECRET,
          # ENCRYPTION_KEY and SITE_URL. See README.md for the bootstrap procedure.
          kubeSecretRef: infisical-secrets
          # Single replica + explicit request/limits: the cluster is 3 small nodes
          # (2 vCPU / 4Gi each) already busy with ArgoCD/Harbor/monitoring, no room
          # for the chart's HA default of 2 replicas with no memory request.
          replicaCount: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

        ingress:
          enabled: true
          hostName: infisical.thysmadev.fr
          ingressClassName: traefik
          nginx:
            # The cluster already runs Traefik as ingress controller, no need for
            # the bundled nginx controller from this chart.
            enabled: false
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls: "true"

        postgresql:
          enabled: true
          primary:
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 300m
                memory: 256Mi

        redis:
          enabled: true
          master:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 150m
                memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: infisical
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
