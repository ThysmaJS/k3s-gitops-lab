apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/ThysmaJS/k3s-gitops-lab.git
    targetRevision: HEAD
    path: infra/infisical
  destination:
    server: https://kubernetes.default.svc
    namespace: infisical
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
