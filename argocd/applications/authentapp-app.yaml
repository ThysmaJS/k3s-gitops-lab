apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentapp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ThysmaJS/k3s-gitops-lab.git
    targetRevision: HEAD
    path: authentapp
  destination:
    server: https://kubernetes.default.svc
    namespace: authent-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true