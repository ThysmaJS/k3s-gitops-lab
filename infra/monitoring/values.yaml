grafana:
  adminPassword: "ChangeMe123!"

  grafana.ini:
    auth.generic_oauth:
      enabled: true
      name: Dex
      client_id: grafana
      client_secret: grafana-dex-secret-change-me
      scopes: openid profile email
      auth_url: https://dex.thysmadev.fr/auth
      token_url: https://dex.thysmadev.fr/token
      api_url: https://dex.thysmadev.fr/userinfo
      allow_sign_up: true
      role_attribute_path: "contains(email, 'admin@thysmadev.fr') && 'Admin' || 'Editor'"

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - grafana.thysmadev.fr

  persistence:
    enabled: true
    size: 2Gi

kubelet:
  serviceMonitor:
    https: true
    insecureSkipVerify: true
    cAdvisorRelabelings:
      - action: replace
        sourceLabels: [__metrics_path__]
        targetLabel: metrics_path

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# k3s embeds ces composants dans un seul binaire — leurs endpoints ne sont pas exposés
# de la même façon que dans un cluster kubeadm standard
kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false

kubeProxy:
  enabled: false

alertmanager:
  enabled: true
