apiVersion: v1
kind: Namespace
metadata:
  name: cloudflared
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-token
  namespace: cloudflared
type: Opaque
stringData:
  token: "eyJhIjoiZmViNWU4YjU1OTI5N2QwZWQwNGE0NWIxZjI4ZGQxMjIiLCJ0IjoiOTA3NmYxNzgtNmU4NS00Njc5LTkyYjYtMTQ1ZDAyZDU3NGQ5IiwicyI6IllXRTROalZtWkdVdFlqYzVNQzAwTnpWakxXRmtOMkl0T0dFelltUTRNVEJoTUdaaSJ9"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        args:
        - tunnel
        - --no-autoupdate
        - run
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflared-token
              key: token
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"