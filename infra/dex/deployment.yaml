apiVersion: v1
kind: Namespace
metadata:
  name: dex
---
apiVersion: v1
kind: Secret
metadata:
  name: dex-passwords
  namespace: dex
type: Opaque
stringData:
  # Générer les hashes avec : htpasswd -nbBC 10 "" "TON_MOT_DE_PASSE" | tr -d ':\n'
  # Ou avec Docker : docker run --rm httpd:2 htpasswd -nbBC 10 "" "TON_MOT_DE_PASSE" | tr -d ':\n'
  admin-hash: "$2a$10$8UftIjUlTh9dkr58YHVNWeRqhbSteMBlhRJh27DzV7k15cAFG5OQO"
  martin-hash: "$2a$10$V.0JuXiuG67P8R9NIQTVy.XmJDljAg7I/BMCihWUT.VlNwA2edQKS"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dex-config
  namespace: dex
data:
  config.yaml: |
    issuer: https://dex.thysmadev.fr

    storage:
      type: memory

    web:
      http: 0.0.0.0:5556

    oauth2:
      skipApprovalScreen: true

    staticClients:
      - id: headlamp
        secret: headlamp-dex-secret-change-me
        name: Headlamp
        redirectURIs:
          - https://headlamp.thysmadev.fr/oidc-callback
      - id: argocd
        secret: argocd-dex-secret-change-me
        name: ArgoCD
        redirectURIs:
          - https://argocd.thysmadev.fr/auth/callback
      - id: harbor
        secret: harbor-dex-secret-change-me
        name: Harbor
        redirectURIs:
          - https://harbor.thysmadev.fr/c/oidc/callback
      - id: grafana
        secret: grafana-dex-secret-change-me
        name: Grafana
        redirectURIs:
          - https://grafana.thysmadev.fr/login/generic_oauth

    staticPasswords:
      - email: admin@thysmadev.fr
        # hash généré via : htpasswd -nbBC 10 "" "MOT_DE_PASSE" | tr -d ':\n'
        hash: "$2a$10$REMPLACER_PAR_HASH_BCRYPT_ADMIN"
        username: admin
        userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
      - email: martin@thysmadev.fr
        hash: "$2a$10$REMPLACER_PAR_HASH_BCRYPT_MARTIN"
        username: martin
        userID: "18a8684b-db88-4b73-90a9-3cd1661f5467"

    enablePasswordDB: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  namespace: dex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dex
  template:
    metadata:
      labels:
        app: dex
    spec:
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.41.1
          command: ["/usr/local/bin/dex", "serve", "/etc/dex/config.yaml"]
          ports:
            - containerPort: 5556
          volumeMounts:
            - name: config
              mountPath: /etc/dex
          resources:
            requests:
              memory: "32Mi"
              cpu: "20m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: config
          configMap:
            name: dex-config
---
apiVersion: v1
kind: Service
metadata:
  name: dex
  namespace: dex
spec:
  selector:
    app: dex
  ports:
    - port: 80
      targetPort: 5556
