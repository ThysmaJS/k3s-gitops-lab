apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  url: https://argocd.thysmadev.fr
  oidc.config: |
    name: Dex
    issuer: https://dex.thysmadev.fr
    clientID: argocd
    clientSecret: argocd-dex-secret-change-me
    requestedScopes:
      - openid
      - profile
      - email
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  policy.default: role:readonly
  policy.csv: |
    g, admin@thysmadev.fr, role:admin
    g, martin@thysmadev.fr, role:readonly
