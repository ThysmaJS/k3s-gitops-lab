# Ajouter un bloc par utilisateur
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: martin
  namespace: headlamp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-martin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: martin
    namespace: headlamp
