apiVersion: v1
kind: Namespace
metadata:
  name: headlamp
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp
  namespace: headlamp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp
    namespace: headlamp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp
  namespace: headlamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headlamp
  template:
    metadata:
      labels:
        app: headlamp
    spec:
      serviceAccountName: headlamp
      hostAliases:
        - ip: "10.43.167.52"
          hostnames:
            - "dex.thysmadev.fr"
      containers:
        - name: headlamp
          image: ghcr.io/headlamp-k8s/headlamp:latest
          args:
            - -in-cluster
            - -plugins-dir=/headlamp/plugins
            - -oidc-client-id=headlamp
            - -oidc-client-secret=headlamp-dex-secret-change-me
            - -oidc-idp-issuer-url=https://dex.thysmadev.fr
            - -oidc-scopes=profile,email
          env:
            - name: SSL_CERT_FILE
              value: /certs/ca.crt
          volumeMounts:
            - name: ca-cert
              mountPath: /certs
              readOnly: true
          ports:
            - containerPort: 4466
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: ca-cert
          secret:
            secretName: cluster-ca-bundle
---
apiVersion: v1
kind: Service
metadata:
  name: headlamp
  namespace: headlamp
spec:
  selector:
    app: headlamp
  ports:
    - port: 80
      targetPort: 4466
