---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mon-super-site-nginx
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: service-nginx-loadbalancer
spec:
  type: LoadBalancer
  selector:
    app: web
  ports:
    - port: 8081
      targetPort: 80
