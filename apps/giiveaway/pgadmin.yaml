apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: giiveaway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      containers:
      - name: pgadmin
        image: dpage/pgadmin4:latest
        env:
        - name: PGADMIN_DEFAULT_EMAIL
          value: mathys.gaillet@gmail.com
        - name: PGADMIN_DEFAULT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: giiveaway-secrets
              key: postgres-password
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  namespace: giiveaway
spec:
  selector:
    app: pgadmin
  ports:
  - port: 80
    targetPort: 80
