apiVersion: apps/v1
kind: Deployment
metadata:
  name: giiveaway-api
  namespace: giiveaway
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: giiveaway-api
  template:
    metadata:
      labels:
        app: giiveaway-api
    spec:
      imagePullSecrets:
      - name: harbor-pull-secret
      containers:
      - name: api
        image: harbor.thysmadev.fr/giiveaway/api:da3b4a9cc695549fef899b32c2ba10c63e3c3a76
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: giiveaway-secrets
              key: database-url
        - name: JWT_ACCESS_SECRET
          valueFrom:
            secretKeyRef:
              name: giiveaway-secrets
              key: jwt-access-secret
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: giiveaway-secrets
              key: jwt-refresh-secret
        - name: JWT_ACCESS_EXPIRES_IN
          value: "15m"
        - name: JWT_REFRESH_EXPIRES_IN
          value: "7d"
        - name: API_URL
          value: "https://api.giiveaway.fr"
        - name: FRONTEND_URL
          value: "https://giiveaway.fr"
        - name: STORAGE_TYPE
          value: "local"
        - name: THROTTLER_DISABLED
          value: "false"
        - name: MAIL_FROM_EMAIL
          value: "noreply@giveaway.com"
        - name: MAIL_FROM_NAME
          value: "GiveAWay"
        - name: BREVO_URL
          value: "https://api.brevo.com/v3/smtp/email"
        - name: BREVO_API_KEY
          valueFrom:
            secretKeyRef:
              name: giiveaway-secrets
              key: brevo-api-key
        - name: PUBLIC_GOOGLE_USERINFO_URL
          value: "https://www.googleapis.com/oauth2/v3/userinfo"
        - name: GOOGLE_CLIENT_WEB_ID
          valueFrom:
            secretKeyRef:
              name: giiveaway-secrets
              key: google-client-web-id
        - name: GOOGLE_ANDROID_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: giiveaway-secrets
              key: google-android-client-id
        - name: GOOGLE_IOS_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: giiveaway-secrets
              key: google-ios-client-id
        - name: CLOUDINARY_CLOUD_NAME
          valueFrom:
            secretKeyRef:
              name: giiveaway-secrets
              key: cloudinary-cloud-name
        - name: CLOUDINARY_API_KEY
          valueFrom:
            secretKeyRef:
              name: giiveaway-secrets
              key: cloudinary-api-key
        - name: CLOUDINARY_API_SECRET
          valueFrom:
            secretKeyRef:
              name: giiveaway-secrets
              key: cloudinary-api-secret
        - name: ASSOCIATION_API_URL
          value: "https://recherche-entreprises.api.gouv.fr/search"
        - name: USE_DETERMINISTIC_OTP
          value: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: giiveaway-front
  namespace: giiveaway
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: giiveaway-front
  template:
    metadata:
      labels:
        app: giiveaway-front
    spec:
      imagePullSecrets:
      - name: harbor-pull-secret
      containers:
      - name: front
        image: harbor.thysmadev.fr/giiveaway/front:da3b4a9cc695549fef899b32c2ba10c63e3c3a76
        ports:
        - containerPort: 80