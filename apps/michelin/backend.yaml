apiVersion: apps/v1
kind: Deployment
metadata:
  name: michelin-backend
  namespace: michelin
  annotations:
    deploy-sha: latest
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: michelin-backend
  template:
    metadata:
      labels:
        app: michelin-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/thysmajs/michelin-backend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: michelin-secrets
              key: database-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
