apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minecraft
  namespace: minecraft
spec:
  replicas: 1
  serviceName: minecraft
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      containers:
        - name: minecraft
          image: itzg/minecraft-server:java21
          ports:
            - containerPort: 25565
              name: mc
          env:
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: "AUTO_CURSEFORGE"
            - name: CF_SLUG
              value: "cobbleverse-cobblemon"
            - name: CF_MODPACK_ZIP
              value: "http://192.168.0.33:8000/COBBLEVERSE-1.7.42-CF.zip"
            - name: CF_API_KEY
              valueFrom:
                secretKeyRef:
                  name: minecraft-curseforge-key
                  key: CF_API_KEY
            - name: MAX_MEMORY
              value: "6G"
            - name: INIT_MEMORY
              value: "4G"
          resources:
            requests:
              memory: "6Gi"
              cpu: "2"
            limits:
              memory: "8Gi"
              cpu: "4"
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
