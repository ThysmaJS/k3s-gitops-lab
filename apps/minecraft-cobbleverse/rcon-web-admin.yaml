apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rcon-web-admin-data
  namespace: minecraft
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rcon-web-admin
  namespace: minecraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rcon-web-admin
  template:
    metadata:
      labels:
        app: rcon-web-admin
    spec:
      containers:
        - name: rcon-web-admin
          image: itzg/rcon:latest
          ports:
            - containerPort: 4326
              name: http
            - containerPort: 4327
              name: ws
          env:
            - name: RWA_RCON_HOST
              value: "minecraft"
            - name: RWA_RCON_PORT
              value: "25575"
            - name: RWA_USERNAME
              value: "admin"
            - name: RWA_ADMIN
              value: "TRUE"
            - name: RWA_RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minecraft-rcon
                  key: RCON_PASSWORD
            - name: RWA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minecraft-rcon
                  key: RWA_PASSWORD
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: data
              mountPath: /opt/rcon-web-admin/db
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rcon-web-admin-data
---
apiVersion: v1
kind: Service
metadata:
  name: rcon-web-admin
  namespace: minecraft
spec:
  type: NodePort
  selector:
    app: rcon-web-admin
  ports:
    - name: http
      port: 4326
      targetPort: 4326
      nodePort: 30326
    - name: ws
      port: 4327
      targetPort: 4327
      nodePort: 30327
